<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Spoty AI | Premium LED</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --spotify-green: #1DB954;
            --neon-green: #21ff6c;
            --bg-dark: #000000;
            --safe-area-bottom: env(safe-area-inset-bottom);
            
            /* Variables dinámicas para el tema */
            --bot-bg: #18181b;
            --bot-text: #ffffff;
            --input-bg: #121212;
            --input-text: #ffffff;
            --header-bg: rgba(0, 0, 0, 0.7);
            --header-text: #ffffff;
        }

        /* Clase MODO CLARO (Mantiene fondo verde, cambia burbujas) */
        .light-mode {
            --bot-bg: #ffffff;
            --bot-text: #000000;
            --input-bg: #f4f4f5;
            --input-text: #000000;
            --header-bg: rgba(255, 255, 255, 0.85);
            --header-text: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            /* FONDO VERDE SPOTIFY */
            background: 
                radial-gradient(circle at 10% 10%, rgba(29, 185, 84, 0.25), transparent 40%),
                radial-gradient(circle at 90% 10%, rgba(29, 185, 84, 0.2), transparent 40%),
                radial-gradient(circle at 50% 90%, rgba(29, 185, 84, 0.3), transparent 50%),
                linear-gradient(180deg, #020617 0%, #000 100%);
            
            color: white;
            height: 100dvh; /* Especial para iPhone */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 🎵 EMOJIS FLOTANTES */
        .bg-music {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1; 
            overflow: hidden;
        }

        .note {
            position: absolute;
            font-size: 40px;
            opacity: 0.15;
            bottom: -60px;
            animation: floatUp 18s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* 🟢 EFECTO LUCES LED NEÓN SUPERIOR */
        .led-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 5px;
            padding-top: 4px;
        }

        .led-bar {
            height: 3px;
            width: 30px;
            background: var(--neon-green);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--neon-green), 0 0 15px var(--neon-green);
            animation: ledPulse 1.5s infinite alternate;
        }

        @keyframes ledPulse {
            0% { opacity: 0.4; filter: brightness(0.8); }
            100% { opacity: 1; filter: brightness(1.5); }
        }

        .led-bar:nth-child(2) { animation-delay: 0.2s; }
        .led-bar:nth-child(3) { animation-delay: 0.4s; }
        .led-bar:nth-child(4) { animation-delay: 0.6s; }

        /* HEADER */
        .header {
            padding: 15px 15px 10px 15px;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(29, 185, 84, 0.2);
            z-index: 100;
            position: relative;
        }

        .logo {
            font-family: 'Poppins';
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--header-text);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px; 
        }

        .nav-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-nav {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-mode { background: var(--spotify-green); color: black; }
        .btn-login { background: transparent; color: var(--header-text); border: 1px solid var(--header-text); }
        .btn-signup { background: white; color: black; }

        /* ÁREA DE CHAT */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 5;
            -webkit-overflow-scrolling: touch;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            padding: 14px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: messageIn 0.3s ease-out;
        }

        .user {
            background: var(--spotify-green);
            color: black;
            align-self: flex-end;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: var(--bot-bg);
            color: var(--bot-text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ACCIONES RÁPIDAS */
        .quick-actions {
            z-index: 10;
            padding: 12px 0;
        }

        .quick-scroll {
            display: flex;
            gap: 8px;
            padding: 0 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .quick-scroll::-webkit-scrollbar { display: none; }

        .quick-scroll button {
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid var(--spotify-green);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* INPUT AREA */
        .input-area {
            background: var(--bg-dark);
            padding: 12px 15px calc(12px + var(--safe-area-bottom));
            z-index: 20;
            border-top: 1px solid rgba(29, 185, 84, 0.1);
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 22px;
            border-radius: 30px;
            color: var(--input-text);
            outline: none;
            font-size: 1rem;
        }

        .send {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #1ed760, #1DB954);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }

        .send svg { width: 22px; height: 22px; fill: black; }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .logo span { display: none; } /* En móviles pequeños solo queda el icono para dar espacio a los botones */
        }
    </style>
</head>

<body>

<!-- 🎵 EMOJIS FLOTANTES -->
<div class="bg-music">
    <div class="note" style="left:10%; animation-delay: 0s;">🎵</div>
    <div class="note" style="left:35%; animation-delay: 5s;">🎶</div>
    <div class="note" style="left:55%; animation-delay: 10s;">🎧</div>
    <div class="note" style="left:75%; animation-delay: 3s;">🎵</div>
    <div class="note" style="left:92%; animation-delay: 8s;">🎶</div>
</div>

<header class="header">
    <!-- Luces LED -->
    <div class="led-container">
        <div class="led-bar"></div>
        <div class="led-bar"></div>
        <div class="led-bar"></div>
        <div class="led-bar"></div>
    </div>

    <div class="logo">🎧 <span>Spoty AI</span></div>
    <div class="nav-actions">
        <button class="btn-nav btn-mode" onclick="toggleTheme()" id="theme-btn">☀️ Modo Claro</button>
        <button class="btn-nav btn-login">Iniciar Sesión</button>
        <button class="btn-nav btn-signup">Registrarse</button>
    </div>
</header>

<main id="chat-container"></main>

<div class="quick-actions">
    <div class="quick-scroll">
        <button onclick="enviarRapido('🔥 Nueva música')">🔥 Nueva</button>
        <button onclick="enviarRapido('💪 Música Gym')">💪 Gym</button>
        <button onclick="enviarRapido('😌 Modo chill')">😌 Chill</button>
        <button onclick="enviarRapido('🇰🇷 K-pop Hits')">🇰🇷 K-pop</button>
    </div>
</div>

<div class="input-area">
    <div class="input-box">
        <input id="mensaje" placeholder="¿Qué quieres escuchar?" autocomplete="off">
        <button class="send" onclick="enviar()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const chat = document.getElementById("chat-container");
    const input = document.getElementById("mensaje");
    const body = document.body;
    const themeBtn = document.getElementById("theme-btn");

    function toggleTheme() {
        body.classList.toggle('light-mode');
        themeBtn.innerText = body.classList.contains('light-mode') ? "🌙 Modo Oscuro" : "☀️ Modo Claro";
    }

    window.onload = () => {
        agregarMensaje("¡Luces listas, beats cargados! 🟢 Soy tu Spoty AI. ¿Qué vibra quieres que domine la sesión hoy?", "bot");
    };

    function agregarMensaje(texto, tipo) {
        const div = document.createElement("div");
        div.className = "message " + tipo;
        div.innerText = texto;
        chat.appendChild(div);
        setTimeout(() => { chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }); }, 60);
    }

    function enviarRapido(txt) {
        input.value = txt;
        enviar();
    }

    async function enviar() {
        const mensaje = input.value.trim();
        if (!mensaje) return;
        agregarMensaje(mensaje, "user");
        input.value = "";
        const temp = document.createElement("div");
        temp.className = "message bot";
        temp.innerText = "🎧 Sincronizando beats...";
        chat.appendChild(temp);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mensaje })
            });
            const data = await res.json();
            temp.remove();
            agregarMensaje(data.respuesta || "Conexión interrumpida.", "bot");
        } catch {
            temp.remove();
            agregarMensaje("Error al conectar con el estudio.", "bot");
        }
    }

    input.addEventListener("keypress", e => { if (e.key === "Enter") enviar(); });
</script>

</body>
</html>
